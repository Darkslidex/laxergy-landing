server {
    listen 80;              # el CMD del Dockerfile reescribe este puerto a ${PORT} (Coolify)
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compresión (el equipo no usa brotli) ──
    gzip on;
    gzip_comp_level 6;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;

    # ── Cache por defecto: no cachear (HTML/JS/CSS revalidan). Los assets
    #    versionables se sobreescriben más abajo con expires 7d. Se usa la
    #    directiva `expires` (no `add_header`) para NO cancelar la herencia
    #    de las cabeceras de seguridad definidas a nivel server. ──
    expires -1;

    # ── Cabeceras de seguridad (nivel server → heredadas por toda respuesta que
    #    no defina su propio add_header). CSP compatible con: GA4 (googletagmanager
    #    / google-analytics), Google Maps embed (www.google.com) y el widget de
    #    SimplyBook.me. style-src permite 'unsafe-inline' porque el diseño usa
    #    estilos inline; los scripts NO usan 'unsafe-inline'. ──
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com; frame-src https://www.google.com https://laxergy.simplybook.me; base-uri 'none'; form-action 'none'; frame-ancestors 'self'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # ── ETAPA PROVISIONAL: no indexar. Al migrar al dominio final, borrar esta línea
    #    (o cambiarla por "all"). Ver README → "Migración a laxergy.com". ──
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        try_files $uri $uri/ =404;
    }

    # Assets estáticos: cache larga. Solo `expires` (sin add_header) para heredar
    # las cabeceras de seguridad de arriba sin repetirlas.
    location ~* \.(woff2|webp|png|jpe?g|svg|ico|gif)$ {
        expires 7d;
    }
}
